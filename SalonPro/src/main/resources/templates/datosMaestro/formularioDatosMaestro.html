<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Configuración</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/global.css}">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-dark text-white d-flex flex-column min-vh-100">

	<header th:replace="~{fragments/cabeceraAdmin :: cabeceraAdmin}"></header>

	<main class="container py-5">
		<div class="row justify-content-center">
			<div class="col-md-8 col-lg-6">
				<h2 class="text-warning mb-4">
					<i class="bi bi-sliders me-2"></i>
					Configuración
				</h2>

				<div th:if="${param.exito}" class="alert alert-success">
					La configuración se ha guardado correctamente.
				</div>

				<form th:action="@{/inicioAdmin/configuracion/submit}" th:object="${datosMaestro}" method="post"
					class="bg-dark p-4 border border-warning rounded">

					<input type="hidden" th:field="*{id}">

					<div class="mb-3">
						<label class="form-label text-warning fw-bold" for="descuentoCumple">
							Descuento de cumpleaños (%)
						</label>
						<input id="descuentoCumple" type="number" min="0" max="100" step="0.01"
							th:classappend="${#fields.hasErrors('descuentoCumple')} ? 'is-invalid' : ''"
							class="form-control border-warning bg-white text-dark" th:field="*{descuentoCumple}"
							required>
						<div class="invalid-feedback" th:if="${#fields.hasErrors('descuentoCumple')}"
							th:errors="*{descuentoCumple}">
							Introduce un descuento entre 0 y 100.
						</div>
					</div>

					<div class="mb-3">
						<label class="form-label text-warning fw-bold" for="cortesPorPunto">
							Cortes necesarios para conseguir un punto
						</label>
						<input id="cortesPorPunto" type="number" min="1"
							th:classappend="${#fields.hasErrors('cortesPorPunto')} ? 'is-invalid' : ''"
							class="form-control border-warning bg-white text-dark" th:field="*{cortesPorPunto}"
							required>
						<div class="invalid-feedback" th:if="${#fields.hasErrors('cortesPorPunto')}"
							th:errors="*{cortesPorPunto}">
							Introduce al menos 1 corte.
						</div>
					</div>

					<div class="mb-3">
						<label class="form-label text-warning fw-bold" for="puntosParaCupon">
							Puntos necesarios para generar el cupón de descuento
						</label>
						<input id="puntosParaCupon" type="number" min="1"
							th:classappend="${#fields.hasErrors('puntosParaCupon')} ? 'is-invalid' : ''"
							class="form-control border-warning bg-white text-dark" th:field="*{puntosParaCupon}"
							required>
						<div class="invalid-feedback" th:if="${#fields.hasErrors('puntosParaCupon')}"
							th:errors="*{puntosParaCupon}">
							Introduce al menos 1 punto.
						</div>
					</div>

					<div class="mb-3">
						<label class="form-label text-warning fw-bold" for="descuentoCupon">
							Descuento del cupón (%)
						</label>
						<input id="descuentoCupon" type="number" min="0" max="100" step="0.01"
							th:classappend="${#fields.hasErrors('descuentoCupon')} ? 'is-invalid' : ''"
							class="form-control border-warning bg-white text-dark" th:field="*{descuentoCupon}"
							required>
						<div class="invalid-feedback" th:if="${#fields.hasErrors('descuentoCupon')}"
							th:errors="*{descuentoCupon}">
							Introduce un descuento entre 0 y 100.
						</div>
					</div>

					<div class="d-flex justify-content-between mt-4">
						<a th:href="@{/inicioAdmin}" class="btn btn-outline-warning">
							<i class="bi bi-arrow-left"></i> Volver
						</a>

						<button type="submit" class="btn btn-warning text-black fw-bold">
							<i class="bi bi-check-circle"></i> Guardar
						</button>
					</div>
				</form>
			</div>
		</div>
	</main>

	<footer th:replace="~{fragments/pie :: pie}"></footer>

</body>

</html>
