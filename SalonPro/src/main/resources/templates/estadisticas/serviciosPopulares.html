<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Servicios Populares</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<link rel="stylesheet" th:href="@{/css/global.css}">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</head>

<body class="bg-dark text-white d-flex flex-column min-vh-100">

	<header th:replace="~{fragments/cabeceraAdmin :: cabeceraAdmin}"></header>

	<main class="container py-4">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<div>
				<h2 class="fw-bold text-warning mb-1">Servicios populares</h2>
				<p class="text-white-50 mb-0">Ranking de servicios más reservados en el salón.</p>
			</div>

			<a class="btn btn-outline-warning" th:href="@{/inicioAdmin}">
				Volver
			</a>
		</div>

		<div class="table-responsive">
			<table class="table table-dark table-striped table-hover align-middle">
				<thead class="table-dark">
					<tr class="text-warning">
						<th>Posición</th>
						<th>Servicio</th>
						<th>Reservas</th>
						<th>Ingresos generados</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="servicio, iter : ${serviciosPopulares}">
						<td th:text="${iter.count}">1</td>
						<td th:text="${servicio[1]}">Servicio</td>
						<td th:text="${servicio[2]}">0</td>
						<td th:text="${#numbers.formatDecimal(servicio[3], 1, 2)} + ' €'">0,00 €</td>
					</tr>

					<tr th:if="${serviciosPopulares == null or serviciosPopulares.isEmpty()}">
						<td colspan="4" class="text-center text-white-50 py-4">
							Todavía no hay servicios reservados.
						</td>
					</tr>
				</tbody>
			</table>
		</div>

	</main>

	<footer th:replace="~{fragments/pie :: pie}"></footer>

</body>

</html>
