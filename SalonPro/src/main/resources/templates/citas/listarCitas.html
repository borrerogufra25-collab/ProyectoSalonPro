<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Listado de Citas</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<link rel="stylesheet" th:href="@{/css/global.css}">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</head>

<body class="bg-dark d-flex flex-column min-vh-100">

	<header th:replace="~{fragments/cabeceraAdmin :: cabeceraAdmin}"></header>

	<main class="container py-4">

		<div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3 mb-4">
			<h2 class="fw-bold text-warning">Lista de citas</h2>

			<a class="btn btn-warning fw-bold text-black" th:href="@{/inicioAdmin/citas/nueva}">
				Nueva Cita
			</a>
		</div>

		<div class="table-responsive">
			<table class="table table-dark table-striped table-hover align-middle">

				<thead class="table-dark">
					<tr class="text-warning">
						<th>Código</th>
						<th>Fecha y Hora</th>
						<th>Cliente</th>
						<th>Servicios</th>
						<th>Precio Total</th>
						<th>Observaciones</th>
						<th>Opciones</th>
					</tr>
				</thead>

				<tbody>

					<tr th:if="${#lists.isEmpty(listaCitas)}">
						<td colspan="7" class="text-center text-white-50 py-4">
							No hay citas registradas todavía.
						</td>
					</tr>

					<tr th:each="c : ${listaCitas}">
						<td th:text="${c.codigo}">-</td>
						<td th:text="${#temporals.format(c.fecha, 'dd/MM/yyyy HH:mm')}">-</td>
						<td th:text="${c.cliente.nombre}">-</td>
						<td>
							<ul class="mb-0 ps-3">
								<li th:each="cs : ${c.citaServicios}" th:text="${cs.servicio.nombre}">-</li>
							</ul>
							<span th:if="${c.citaServicios == null or c.citaServicios.isEmpty()}">-</span>
						</td>
						<td th:text="${c.precioTotal} + ' €'">-</td>
						<td
							th:text="${c.citaServicios != null and !c.citaServicios.isEmpty()} ? ${c.citaServicios[0].observaciones} : '-'">
							-
						</td>

						<td>
							<a class="btn btn-sm btn-warning"
								th:href="@{/inicioAdmin/citas/editar/{id}(id=${c.codigo})}">Editar</a>

							<button type="button" class="btn btn-sm btn-danger" data-bs-toggle="modal"
								th:data-bs-target="'#modalBorrar' + ${c.codigo}">Borrar
							</button>

							<div class="modal fade" th:id="'modalBorrar' + ${c.codigo}" tabindex="-1"
								aria-hidden="true">
								<div class="modal-dialog modal-dialog-centered">
									<div class="modal-content bg-dark border border-warning text-white">

										<div class="modal-header text-warning border-bottom border-secondary">
											<h4 class="modal-title">¿Estás seguro?</h4>
											<button type="button" class="btn-close btn-close-white"
												data-bs-dismiss="modal"></button>
										</div>

										<div class="modal-body text-center py-3">
											<p>¿Estás seguro de que deseas eliminar la cita de
												<strong class="text-warning"
													th:text="${c.cliente.nombre}">Cliente</strong>?
											</p>
											<p class="text-danger small">Esta acción no se puede deshacer.</p>
										</div>

										<div
											class="modal-footer border-top border-secondary d-flex justify-content-center">
											<a class="btn btn-danger px-4"
												th:href="@{/inicioAdmin/citas/borrar/{id}(id=${c.codigo})}">
												Sí
											</a>
											<button type="button" class="btn btn-secondary px-4"
												data-bs-dismiss="modal">No</button>
										</div>

									</div>
								</div>
							</div>
						</td>
					</tr>
				</tbody>

			</table>
		</div>

	</main>

	<footer th:replace="~{fragments/pie :: pie}"></footer>

</body>

</html>
