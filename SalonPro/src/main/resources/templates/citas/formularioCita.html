<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Crear Cita</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-dark text-white d-flex flex-column min-vh-100">

	<header th:replace="~{fragments/cabeceraAdmin :: cabeceraAdmin}"></header>

	<main class="container py-5">
		<div class="row justify-content-center">
			<div class="col-md-8 col-lg-6">

				<h2 class="text-warning mb-4">
					<i class="bi bi-calendar-plus me-2"></i>Nueva Cita
				</h2>

				<div class="card bg-dark border-secondary p-4 shadow">
					<form th:action="@{/inicioAdmin/citas/nueva/submit}" th:object="${cita}" method="post">

						<input type="hidden" th:field="*{codigo}" />

						<div class="mb-3">
							<label class="form-label text-warning fw-bold">Fecha</label>
							<input type="date" class="form-control border-warning bg-white" th:field="*{fecha}"
								required>
						</div>

						<div class="mb-3">
							<label class="form-label text-warning fw-bold">Cliente</label>
							<select class="form-select border-warning bg-white" th:field="*{cliente}" required>
								<option value="" selected disabled>Selecciona un cliente...</option>
								<option th:each="c : ${listaClientes}" th:value="${c.id}"
									th:text="${c.nombre} + ' (' + ${c.telefono} + ')'">
								</option>
							</select>
						</div>

						<div class="mb-3">
							<label class="form-label text-warning fw-bold">Servicio</label>
							<select class="form-select border-warning bg-white" th:field="*{servicios}" required>
								<option value="" selected disabled>Selecciona un servicio...</option>
								<option th:each="s : ${listaServicios}" th:value="${s.id}"
									th:text="${s.nombre} + ' - ' + ${s.precio} + '€'">
								</option>
							</select>
						</div>

						<div class="d-flex justify-content-between mt-4">
							<a th:href="@{/inicioAdmin}" class="btn btn-outline-secondary px-4">Cancelar</a>
							<button type="submit" class="btn btn-warning px-4 fw-bold">Guardar Cita</button>
						</div>

					</form>
				</div>
			</div>
		</div>
	</main>

	<footer th:replace="~{fragments/pie :: pie}"></footer>

</body>

</html>
