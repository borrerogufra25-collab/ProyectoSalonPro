<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Crear Cita</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-dark text-white">

	<header th:replace="~{fragments/cabeceraAdmin :: cabeceraAdmin}"></header>

	<main class="container py-5">
		<div class="row justify-content-center">
			<div class="col-md-8 col-lg-6">

				<h2 class="text-warning mb-4">
					<i class="bi bi-calendar-plus me-2"></i>Nueva Cita
				</h2>


				<form
					th:action="${cita.codigo != null} ? @{/inicioAdmin/citas/editar/submit} : @{/inicioAdmin/citas/nueva/submit}"
					th:object="${cita}" method="post" class="bg-dark p-4 border border-warning rounded">

					<input type="hidden" th:field="*{codigo}" />

					<div class="mb-3">
						<label class="form-label text-warning fw-bold">Fecha y Hora</label>
						<input type="datetime-local" class="form-control border-warning bg-white" th:field="*{fecha}"
							required>
					</div>

					<div class="mb-3">
						<label class="form-label text-warning fw-bold">Cliente</label>
						<select class="form-select border-warning bg-white" th:field="*{cliente}" required>
							<option value="" selected disabled>Selecciona un cliente...</option>
							<option th:each="c : ${listaClientes}" th:value="${c.id}"
								th:text="${c.nombre} + ' (' + ${c.telefono} + ')'"></option>
						</select>
					</div>

					<div class="mb-3">
						<label class="form-label text-warning fw-bold">Observaciones</label>
						<textarea class="form-control border-warning bg-white" name="observaciones" rows="3"
							th:text="${cita.citaServicios != null and !cita.citaServicios.isEmpty()} ? ${cita.citaServicios[0].observaciones} : ''">
						</textarea>
					</div>

					<div class="d-flex justify-content-between mt-4">
						<a th:href="@{/inicioAdmin/citas}" class="btn btn-outline-warning">
							<i class="bi bi-arrow-left"></i> Volver
						</a>

						<button type="submit" value="submit" class="btn btn-warning text-black fw-bold">
							<i class="bi bi-check-circle"></i> Guardar
						</button>
					</div>
				</form>
			</div>
		</div>
	</main>

	<footer th:replace="~{fragments/pie :: pie}"></footer>

</body>

</html>
