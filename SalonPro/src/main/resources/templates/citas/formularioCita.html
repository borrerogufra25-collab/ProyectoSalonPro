<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Crear Cita</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/global.css}">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-dark text-white">

	<header th:replace="~{fragments/cabeceraAdmin :: cabeceraAdmin}"></header>

	<main class="container py-5">
		<div class="row justify-content-center">
			<div class="col-md-8 col-lg-6">
				<h2 class="text-warning mb-4">
					<i class="bi bi-calendar-plus me-2"></i>
					<span th:text="${cita.codigo != null} ? 'Editar Cita' : 'Nueva Cita'">Cita</span>
				</h2>

				<div th:if="${param.error}" class="alert alert-danger">
					<span th:text="${param.error}">Error al guardar la cita.</span>
				</div>

				<form
					th:action="${cita.codigo != null} ? @{/inicioAdmin/citas/editar/submit} : @{/inicioAdmin/citas/nueva/submit}"
					th:object="${cita}" method="post" class="bg-dark p-4 border border-warning rounded">

					<input type="hidden" th:field="*{codigo}" />

					<div class="mb-3">
						<label class="form-label text-warning fw-bold">Fecha y Hora</label>
						<input type="datetime-local" th:field="*{fecha}"
							class="form-control border-warning bg-white text-dark" required>
					</div>

					<div class="mb-3">
						<label class="form-label text-warning fw-bold">Cliente</label>
						<select class="form-select border-warning bg-white" name="clienteId" required>
							<option value="" disabled>Selecciona un cliente...</option>
							<option th:each="c : ${listaClientes}" th:value="${c.id}"
								th:selected="${cita.cliente != null and cita.cliente.id == c.id}" th:text="${c.nombre}">
							</option>
						</select>
					</div>

					<div class="mb-3" th:if="${cita.codigo == null}">
						<label class="form-label text-warning fw-bold">Servicio</label>
						<select class="form-select border-warning bg-white" name="servicioId" id="servicioSelect"
							required>
							<option value="" disabled>Selecciona un servicio...</option>
							<option th:each="s : ${listaServicios}" th:value="${s.id}"
								th:selected="${cita.citaServicios != null and !cita.citaServicios.isEmpty() and cita.citaServicios[0].servicio.id == s.id}"
								th:text="${s.nombre} + ' (' + ${s.precio} + ' €)'"></option>
						</select>
					</div>

					<div class="mb-3" th:if="${cita.codigo != null}">
						<label class="form-label text-warning fw-bold">Servicios</label>

						<div class="table-responsive">
							<table class="table table-dark table-striped align-middle mb-0">
								<thead>
									<tr class="text-warning">
										<th>Servicio</th>
										<th>Precio</th>
										<th>Duración</th>
										<th class="text-center">Cantidad</th>
									</tr>
								</thead>
								<tbody>
									<tr th:each="s : ${listaServicios}">
										<td th:text="${s.nombre}">Servicio</td>
										<td th:text="${s.precio + ' €'}">0 €</td>
										<td th:text="${s.duracion != null ? s.duracion.toMinutes() + ' min' : '-'}">-
										</td>
										<td class="text-center">
											<input type="number" min="0"
												class="form-control form-control-sm text-center mx-auto"
												style="max-width: 90px;" th:name="${'cantidadServicio_' + s.id}"
												th:value="${serviciosCantidad[s.id] != null ? serviciosCantidad[s.id] : 0}">
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>

					<div class="mb-3">
						<label class="form-label text-warning fw-bold">Observaciones</label>
						<textarea class="form-control border-warning bg-white" name="observaciones" rows="3"
							th:text="${cita.citaServicios != null and !cita.citaServicios.isEmpty()} ? ${cita.citaServicios[0].observaciones} : ''"></textarea>
					</div>

					<div class="d-flex justify-content-between mt-4">
						<a th:href="@{/inicioAdmin/citas}" class="btn btn-outline-warning">
							<i class="bi bi-arrow-left"></i> Volver
						</a>

						<button type="submit" value="submit" class="btn btn-warning text-black fw-bold">
							<i class="bi bi-check-circle"></i> Guardar
						</button>
					</div>
				</form>
			</div>
		</div>
	</main>

	<footer th:replace="~{fragments/pie :: pie}"></footer>

</body>

</html>
