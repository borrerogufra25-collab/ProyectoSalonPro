<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Listado de Clientes</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-dark d-flex flex-column min-vh-100">

	<header th:replace="~{fragments/cabeceraAdmin :: cabeceraAdmin}"></header>

	<main class="container py-4">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2 class="fw-bold text-warning">Lista de clientes</h2>

			<a class="btn btn-warning fw-bold text-black" th:href="@{/clientes/formularioCliente}">
				Nuevo Cliente
			</a>
		</div>

		<div class="table-responsive">
			<table class="table table-dark table-striped table-hover align-middle">

				<thead class="table-dark">
					<tr class="text-warning">
						<th>ID</th>
						<th>Nombre</th>
						<th>Teléfono</th>
						<th>Email</th>
						<th>Cumpleaños</th>
						<th>Opciones</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="c : ${listaClientes}">
						<td th:text="${c.id}">-</td>
						<td th:text="${c.nombre}">-</td>
						<td th:text="${c.telefono}">-</td>
						<td th:text="${c.email}">-</td>
						<td th:text="${#temporals.format(c.cumple, 'dd/MM/yyyy')}">-</td>
						<td>
							<a class="btn btn-sm btn-info" th:href="@{/formularioCliente/{id}(id=${c.id})}">Editar</a>
						</td>
					</tr>
				</tbody>

			</table>
		</div>

	</main>

	<footer th:replace="~{fragments/pie :: pie}"></footer>

</body>

</html>
