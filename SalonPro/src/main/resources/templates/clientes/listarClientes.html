<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Listado de Clientes</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</head>

<body class="bg-dark d-flex flex-column min-vh-100">

	<header th:replace="~{fragments/cabeceraAdmin :: cabeceraAdmin}"></header>

	<main class="container py-4">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2 class="fw-bold text-warning">Lista de clientes</h2>

			<a class="btn btn-warning fw-bold text-black" th:href="@{/inicioAdmin/clientes/nuevo}">
				Nuevo Cliente
			</a>
		</div>

		<div class="table-responsive">
			<table class="table table-dark table-striped table-hover align-middle">

				<thead class="table-dark">
					<tr class="text-warning">
						<th>ID</th>
						<th>Nº Cortes</th>
						<th>Nombre</th>
						<th>Teléfono</th>
						<th>Email</th>
						<th>Cumpleaños</th>
						<th>Opciones</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="c : ${listaClientes}">
						<td th:text="${c.id}">-</td>
						<td th:text="${c.numCortes}">-</td>
						<td th:text="${c.nombre}">-</td>
						<td th:text="${c.telefono}">-</td>
						<td th:text="${c.email}">-</td>
						<td th:text="${#temporals.format(c.cumple, 'dd/MM/yyyy')}">-</td>
						<td>
							<a class="btn btn-sm btn-warning"
								th:href="@{/inicioAdmin/clientes/editar/{id}(id=${c.id})}">Editar</a>

							<button type="button" class="btn btn-sm btn-danger" data-bs-toggle="modal"
								th:data-bs-target="'#modalBorrar' + ${c.id}">
								Borrar
							</button>

							<div class="modal fade" th:id="'modalBorrar' + ${c.id}" tabindex="-1" aria-hidden="true">
								<div class="modal-dialog modal-dialog-centered">
									<div class="modal-content bg-dark border border-secondary text-white">

										<div class="modal-header text-warning border-bottom border-secondary">
											<h4 class="modal-title">¿Estás seguro?</h4>
											<button type="button" class="btn-close btn-close-white"
												data-bs-dismiss="modal"></button>
										</div>

										<div class="modal-body text-center py-3">
											<p>Vas a eliminar al cliente: <strong class="text-warning"
													th:text="${c.nombre}">Cliente</strong></p>
											<p class="text-danger small">Esta acción no se puede deshacer.</p>
										</div>

										<div
											class="modal-footer border-top border-secondary d-flex justify-content-center">
											<a class="btn btn-danger px-4"
												th:href="@{/inicioAdmin/clientes/borrar/{id}(id=${c.id})}">Sí</a>
											<button type="button" class="btn btn-secondary px-4"
												data-bs-dismiss="modal">No</button>
										</div>
									</div>
								</div>
							</div>

						</td>
					</tr>
				</tbody>

			</table>
		</div>

	</main>

	<footer th:replace="~{fragments/pie :: pie}"></footer>

</body>

</html>
