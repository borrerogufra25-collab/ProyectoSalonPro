<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<body>

	<header th:fragment="cabeceraUsuario" class="border-bottom border-secondary">

		<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
			<div class="container-fluid">

				<a class="navbar-brand text-warning fw-bold" th:href="@{/inicioUsuario}">
					<i class="bi bi-person-circle me-2 fs-3"></i> Área Usuario
				</a>

				<button class="navbar-toggler border-warning" type="button" data-bs-toggle="collapse"
					data-bs-target="#navbarUsuario" aria-controls="navbarUsuario" aria-expanded="false"
					aria-label="Abrir navegación">
					<span class="navbar-toggler-icon"></span>
				</button>

				<div class="collapse navbar-collapse" id="navbarUsuario">

					<ul class="navbar-nav me-auto">

						<li class="nav-item">
							<a class="nav-link text-warning" th:href="@{/inicioUsuario/citas}">Mis Citas</a>
						</li>

						<li class="nav-item">
							<a class="nav-link text-warning" th:href="@{/inicioUsuario/servicios}">Reservar Cita</a>
						</li>

					</ul>

					<form th:action="@{/logout}" method="post" id="salir"></form>
					<a class="logout btn btn-outline-warning fw-bold mt-3 mt-lg-0"
						href="javascript:document.getElementById('salir').submit()">Cerrar sesión</a>

				</div>
			</div>
		</nav>

	</header>

</body>

</html>
