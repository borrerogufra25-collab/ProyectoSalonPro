<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Inicio de Sesión</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-dark">

	<header th:replace="~{fragments/cabecera :: cabecera}"></header>

	<main class="container d-flex justify-content-center align-items-center min-vh-100">

		<div class="card bg-dark border-warning p-4 shadow">

			<h3 class="text-warning text-center mb-4 fw-bold">
				<i class="bi bi-person-circle me-2"></i>Iniciar Sesión
			</h3>

			<form>
				<div class="mb-3">
					<label class="form-label text-warning fw-bold">Usuario</label>
					<input type="text" class="form-control bg-white bg-opacity-25 text-white border-warning" required>
				</div>

				<div class="mb-3">
					<label class="form-label text-warning fw-bold">Contraseña</label>
					<input type="password" class="form-control bg-white bg-opacity-25 text-white border-warning"
						required>
				</div>

				<button type="submit" class="btn btn-warning w-100 fw-bold text-black">
					Entrar
				</button>
			</form>

		</div>

	</main>

	<footer th:replace="~{fragments/pie :: pie}"></footer>

</body>

</html>
