<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Área Usuario</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</head>

<body class="bg-dark text-white d-flex flex-column min-vh-100">

	<header th:replace="~{fragments/cabeceraUsuario :: cabeceraUsuario}"></header>

	<main class="container py-5">

		<h1 class="text-warning mb-4">Área Usuario</h1>
		<p class="mb-5">Bienvenido. Puedes gestionar tus citas desde aquí.</p>

		<div class="row g-4">

			<!-- Mis Citas -->
			<div class="col-12 col-md-6">
				<a href="#" class="text-decoration-none">
					<div class="card bg-dark border-warning h-100">
						<div class="card-body text-center">
							<i class="bi bi-journal-text text-warning fs-1"></i>
							<h4 class="text-warning mt-3">Mis Citas</h4>
							<p class="text-white-50">Consulta el historial y estado de tus citas.</p>
						</div>
					</div>
				</a>
			</div>

			<!-- Reservar Cita -->
			<div class="col-12 col-md-6">
				<a href="#" class="text-decoration-none">
					<div class="card bg-dark border-warning h-100">
						<div class="card-body text-center">
							<i class="bi bi-calendar-plus text-warning fs-1"></i>
							<h4 class="text-warning mt-3">Reservar Cita</h4>
							<p class="text-white-50">Elige fecha, servicio y crea una nueva reserva.</p>
						</div>
					</div>
				</a>
			</div>

		</div>

	</main>

	<footer th:replace="~{fragments/pie :: pie}"></footer>

</body>

</html>
