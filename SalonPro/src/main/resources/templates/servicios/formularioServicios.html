<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Gestionar Servicio</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<link rel="stylesheet" th:href="@{/css/global.css}">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</head>

<body class="bg-dark text-white d-flex flex-column min-vh-100">

	<header th:replace="~{fragments/cabeceraAdmin :: cabeceraAdmin}"></header>

	<main class="container py-5">
		<h2 class="text-warning mb-4">
			Nuevo Servicio
		</h2>

		<form method="POST" th:object="${nuevoServicio}"
			th:action="*{id} != null and *{id} != 0 ? @{/inicioAdmin/servicios/editar/submit} : @{/inicioAdmin/servicios/nuevo/submit}"
			class="bg-dark p-4 border border-warning rounded">

			<input type="hidden" th:field="*{id}">

			<div class="mb-3">
				<label class="form-label text-warning fw-bold" for="nombre">Nombre del Servicio</label>
				<input type="text" class="form-control border-warning bg-white" name="nombre" th:field="*{nombre}"
					required>
				<small class="text-white">Ej: Corte de pelo Caballero, Tinte, Lavado, etc.</small>
			</div>

			<div class="mb-3">
				<label class="form-label text-warning fw-bold" for="precio">Precio (€)</label>
				<input type="number" step="0.01" min="0" class="form-control border-warning bg-white" name="precio"
					th:field="*{precio}" required>
				<small class="text-white">Introduce el coste del servicio. Ej: 14.50</small>
			</div>

			<div class="mb-3">
				<label class="form-label text-warning fw-bold" for="duracion">Duración (minutos)</label>
				<input type="number" min="1" class="form-control border-warning bg-white" name="duracion"
					th:field="*{duracion}" required>
				<small class="text-white">Tiempo estimado de ejecución en minutos. Ej: 30</small>
			</div>

			<!-- <div>
                MIRAR COMO SE METEN FOTOS
            </div> -->

			<div class="d-flex justify-content-between mt-4">
				<a th:href="@{/inicioAdmin/servicios}" class="btn btn-outline-warning">
					<i class="bi bi-arrow-left"></i> Volver
				</a>

				<button type="submit" class="btn btn-warning text-black fw-bold">
					<i class="bi bi-check-circle"></i> Guardar
				</button>
			</div>

		</form>

	</main>

	<footer th:replace="~{fragments/pie :: pie}"></footer>

</body>

</html>
