<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Listado de Servicios</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-dark d-flex flex-column min-vh-100">

	<header th:replace="~{fragments/cabeceraAdmin :: cabeceraAdmin}"></header>

	<hr>

	<main class="container py-4">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2 class="fw-bold text-warning">Lista de servicios</h2>

			<a class="btn btn-warning fw-bold text-black" th:href="@{/inicioAdmin/servicios/nuevo}">
				Nuevo Servicio
			</a>
		</div>

		<div class="table-responsive">
			<table class="table table-dark table-striped table-hover align-middle">

				<thead class="table-dark">
					<tr class="text-warning">
						<th>ID</th>
						<th>Imagen</th>
						<th>Nombre</th>
						<th>Precio</th>
						<th>Duración</th>
						<th>Opciones</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="s : ${Servicios}">
						<td th:text="${s.id}">-</td>
						<td></td>
						<!-- <td>
							<i class="bi bi-scissors text-warning fs-4" th:if="${s.imagen == null}"></i>
							<img th:if="${s.imagen != null}" th:src="@{/images/{img}(img=${s.imagen})}" alt="Servicio"
								style="width: 40px; height: 40px; object-fit: cover;" class="rounded">
						</td> -->
						<td th:text="${s.nombre}">-</td>
						<td th:text="${s.precio} + ' €'">-</td>
						<td th:text="${s.duracion != null ? s.duracion.toMinutes() + ' min' : '-'}">-</td>
						<td>
							<a class="btn btn-sm btn-warning"
								th:href="@{/inicioAdmin/servicios/editar/{id}(id=${s.id})}">Editar</a>

							<button type="button" class="btn btn-sm btn-danger" data-bs-toggle="modal"
								th:data-bs-target="'#modalBorrar' + ${s.id}">
								Borrar
							</button>

							<div class="modal fade" th:id="'modalBorrar' + ${s.id}" tabindex="-1" aria-hidden="true">
								<div class="modal-dialog modal-dialog-centered">
									<div class="modal-content bg-dark border border-secondary text-white">

										<div class="modal-header border-bottom border-secondary text-warning">
											<h5 class="modal-title">¿Estás seguro?</h5>
											<button type="button" class="btn-close btn-close-white"
												data-bs-dismiss="modal" aria-label="Close"></button>
										</div>

										<div class="modal-body text-center py-4">
											<p>Vas a eliminar el servicio: <strong class="text-warning"
													th:text="${s.nombre}">Servicio</strong></p>
											<p class="text-danger small"> Esta acción no se puede deshacer.</p>
										</div>

										<div
											class="modal-footer border-top border-secondary d-flex justify-content-center">
											<a class="btn btn-danger px-4"
												th:href="@{/inicioAdmin/servicios/borrar/{id}(id=${s.id})}">Sí</a>
											<button type="button" class="btn btn-secondary px-4"
												data-bs-dismiss="modal">No</button>
										</div>

									</div>
								</div>
							</div>

						</td>
					</tr>
				</tbody>

			</table>
		</div>

	</main>

	<hr>

	<footer th:replace="~{fragments/pie :: pie}"></footer>

</body>

</html>
