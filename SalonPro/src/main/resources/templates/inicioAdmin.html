<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Área Administrador</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-dark text-white d-flex flex-column min-vh-100">

	<header th:replace="~{fragments/cabeceraAdmin :: cabeceraAdmin}"></header>

	<main class="container py-5">

		<h1 class="text-warning mb-4">Panel de Administración</h1>
		<p class="mb-5">Bienvenido al área de gestión. Selecciona una sección para administrar los datos del sistema.
		</p>

		<div class="row g-4">

			<!-- Clientes -->
			<div class="col-12 col-md-4">
				<a th:href="@{/inicioAdmin/clientes}" class="text-decoration-none">
					<div class="card bg-dark border-warning h-100">
						<div class="card-body text-center">
							<i class="bi bi-people-fill text-warning fs-1"></i>
							<h4 class="text-warning mt-3">Clientes</h4>
							<p class="text-white-50">Consulta y administra la información de los clientes.</p>
						</div>
					</div>
				</a>
			</div>

			<!-- Servicios -->
			<div class="col-12 col-md-4">
				<a href="#" class="text-decoration-none">
					<div class="card bg-dark border-warning h-100">
						<div class="card-body text-center">
							<i class="bi bi-scissors text-warning fs-1"></i>
							<h4 class="text-warning mt-3">Servicios</h4>
							<p class="text-white-50">Gestiona los servicios ofrecidos por el salón.</p>
						</div>
					</div>
				</a>
			</div>

			<!-- Citas -->
			<div class="col-12 col-md-4">
				<a href="#" class="text-decoration-none">
					<div class="card bg-dark border-warning h-100">
						<div class="card-body text-center">
							<i class="bi bi-calendar-event text-warning fs-1"></i>
							<h4 class="text-warning mt-3">Citas</h4>
							<p class="text-white-50">Gestiona las reservas y horarios del salón.</p>
						</div>
					</div>
				</a>
			</div>

		</div>

	</main>

	<!-- Cuando tenga las citas, hacer que se vean las 3 más próximas aquí debajo -->

</body>

</html>
