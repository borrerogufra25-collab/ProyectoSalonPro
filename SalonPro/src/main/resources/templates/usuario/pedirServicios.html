<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Reservar servicios</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/global.css}">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-dark text-warning d-flex flex-column min-vh-100">

	<header th:replace="~{fragments/cabeceraUsuario :: cabeceraUsuario}"></header>

	<main class="container-fluid py-4 flex-grow-1">
	<div class="row g-4">

		<!-- Validaciones -->

		<div class="alert alert-danger text-center" th:if="${param.error}">
			<i class="bi bi-exclamation-octagon-fill"></i>
			<span th:text="${param.error}"></span>
		</div>

		<!-- Servicios -->

		<div class="col-12 col-lg-5">
			<h3 class="text-warning">Servicios disponibles</h3>

			<div class="table-responsive">
				<table class="table table-dark table-striped align-middle">
					<thead>
						<tr>
							<th>Servicio</th>
							<th>Precio</th>
							<th>Duración</th>
							<th></th>
						</tr>
					</thead>

					<tbody>
						<tr th:each="s : ${productos}">
							<td th:text="${s.nombre}">Nombre</td>
							<td th:text="${s.precio + ' €'}">0</td>
							<td th:text="${s.duracion != null ? s.duracion.toMinutes() + ' min' : '-'}">0 min</td>

							<td>
								<a th:href="@{'/inicioUsuario/servicios/' + ${s.id}}" class="btn btn-warning btn-sm">
									Añadir
								</a>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<!-- Carrito -->

		<div class="col-12 col-md-6 col-lg-3">

			<h3 class="text-warning">Tu pedido</h3>

			<ul class="list-group mb-3">

				<li class="list-group-item bg-dark text-white-50" th:if="${#maps.isEmpty(carrito)}">
					Añade algún servicio
				</li>

				<li class="list-group-item bg-dark text-warning" th:each="entry : ${carrito}">
					<div class="d-flex justify-content-between align-items-center gap-2">
						<span>
							<strong class="pe-4" th:text="${entry.key.nombre}">Nombre</strong>
							<span th:text="${entry.key.precio}">0</span> €
						</span>

						<a th:href="@{'/carrito/borrar/' + ${entry.key.id}}" class="btn btn-sm btn-outline-danger">
							<i class="bi bi-trash"></i>
						</a>
					</div>
				</li>
			</ul>

			<div class="pb-5">
				<h5 class="text-warning">
					Total: <span th:text="${#numbers.formatCurrency(total_carrito)}"></span>
				</h5>

				<a href="/carrito/vaciar" class="btn btn-danger mt-3 w-100">
					<i class="bi bi-trash"></i> Vaciar carrito
				</a>
			</div>

		</div>

		<!-- Fecha y hora -->

		<div class="col-12 col-md-6 col-lg-4">
			<h3 class="text-warning">Seleccionar fecha y hora</h3>

			<form th:action="@{/carrito/tramitar}" method="POST">

				<div class="mb-3">
					<label class="form-label text-warning fw-bold">Cliente</label>
					<p class="text-white-50" th:text="${cliente != null ? cliente.nombre : 'Usuario'}">Usuario</p>
				</div>

				<div class="mb-3">
					<label class="form-label text-warning fw-bold">Fidelización</label>
					<p class="text-white-50 mb-1">
						Puntos: <span th:text="${cliente != null ? cliente.puntos : 0}">0</span>
					</p>
					<p class="text-success mb-0"
						th:if="${cuponesDisponibles != null and !#lists.isEmpty(cuponesDisponibles)}">
						Tienes un cupón pendiente para esta reserva.
					</p>
				</div>

				<div class="mb-3">
					<label class="form-label text-warning fw-bold">Fecha y Hora</label>
					<input name="fechaHora" type="datetime-local" class="form-control border-warning bg-white text-dark"
						required>
				</div>

				<div class="mb-3">
					<label class="form-label text-warning fw-bold">Observaciones</label>
					<textarea class="form-control border-warning bg-white text-dark" name="observaciones"
						rows="3"></textarea>
				</div>

				<button type="submit" class="btn btn-success w-100">
					<i class="bi bi-check-circle"></i> Reservar cita
				</button>

			</form>
		</div>

	</div>
	</main>

	<footer th:replace="~{fragments/pie :: pie}"></footer>

</body>

</html>
