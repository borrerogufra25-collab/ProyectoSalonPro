<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mis Citas</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/global.css}">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-dark d-flex flex-column min-vh-100">

	<header th:replace="~{fragments/cabeceraUsuario :: cabeceraUsuario}"></header>

	<main class="container py-4">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2 class="fw-bold text-warning">Mis citas</h2>

			<a class="btn btn-warning fw-bold text-black" th:href="@{/inicioUsuario/servicios}">
				Reservar nueva cita
			</a>
		</div>

		<div class="table-responsive">
			<table class="table table-dark table-striped table-hover align-middle">

				<thead class="table-dark">
					<tr class="text-warning">
						<th>Fecha</th>
						<th>Precio Total</th>
						<th>Servicios</th>
						<th>Observaciones</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="c : ${citas}">
						<td th:text="${#temporals.format(c.fecha, 'dd/MM/yyyy HH:mm')}">-</td>

						<td>
							<span th:text="${c.precioTotal}"></span> €
						</td>

						<td>
							<ul class="mb-0">
								<li th:each="s : ${c.citaServicios}" th:text="${s.servicio.nombre}"></li>
							</ul>
						</td>

						<td
							th:text="${c.citaServicios != null and !c.citaServicios.isEmpty() ? c.citaServicios[0].observaciones : '-'}">
							-</td>
					</tr>

					<tr th:if="${citas.isEmpty()}">
						<td colspan="4" class="text-center text-white-50 py-4">
							No tienes citas reservadas todavía.
						</td>
					</tr>
				</tbody>

			</table>
		</div>

		<div class="mt-4">
			<a class="btn btn-secondary" th:href="@{/inicioUsuario}">
				<i class="bi bi-arrow-left"></i> Volver
			</a>
		</div>

	</main>

	<footer th:replace="~{fragments/pie :: pie}"></footer>

</body>

</html>
