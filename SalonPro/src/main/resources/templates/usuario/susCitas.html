<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mis Citas</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/global.css}">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-dark d-flex flex-column min-vh-100">

	<header th:replace="~{fragments/cabeceraUsuario :: cabeceraUsuario}"></header>

	<main class="container py-4">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2 class="fw-bold text-warning">Mis citas</h2>

			<a class="btn btn-warning fw-bold text-black" th:href="@{/inicioUsuario/servicios}">
				Reservar nueva cita
			</a>
		</div>

		<div class="table-responsive">
			<table class="table table-dark table-striped table-hover align-middle">

				<thead class="table-dark">
					<tr class="text-warning">
						<th>Fecha</th>
						<th>Precio Total</th>
						<th>Servicios</th>
						<th>Observaciones</th>
						<th>Opciones</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="c : ${citas}">
						<td th:text="${#temporals.format(c.fecha, 'dd/MM/yyyy HH:mm')}">-</td>

						<td>
							<span th:text="${c.precioTotal}"></span> €
						</td>

						<td>
							<ul class="mb-0">
								<li th:each="s : ${c.citaServicios}" th:text="${s.servicio.nombre}"></li>
							</ul>
						</td>

						<td
							th:text="${c.citaServicios != null and !c.citaServicios.isEmpty() ? c.citaServicios[0].observaciones : '-'}">
							-</td>

						<td>
							<a class="btn btn-sm btn-warning"
								th:href="@{/inicioUsuario/citas/editar/{id}(id=${c.codigo})}">
								<i class="bi bi-pencil-square"></i> Editar
							</a>

							<button type="button" class="btn btn-sm btn-danger" data-bs-toggle="modal"
								th:data-bs-target="'#modalBorrar' + ${c.codigo}">
								<i class="bi bi-trash"></i> Borrar
							</button>

							<div class="modal fade" th:id="'modalBorrar' + ${c.codigo}" tabindex="-1"
								aria-hidden="true">
								<div class="modal-dialog modal-dialog-centered">
									<div class="modal-content bg-dark border border-warning text-white">

										<div class="modal-header text-warning border-bottom border-secondary">
											<h4 class="modal-title">¿Estás seguro?</h4>
											<button type="button" class="btn-close btn-close-white"
												data-bs-dismiss="modal"></button>
										</div>

										<div class="modal-body text-center py-3">
											<p>¿Quieres eliminar esta cita?</p>
											<p class="text-danger small">Esta acción no se puede deshacer.</p>
										</div>

										<div
											class="modal-footer border-top border-secondary d-flex justify-content-center">
											<a class="btn btn-danger px-4"
												th:href="@{/inicioUsuario/citas/borrar/{id}(id=${c.codigo})}">
												Sí
											</a>
											<button type="button" class="btn btn-secondary px-4"
												data-bs-dismiss="modal">No</button>
										</div>

									</div>
								</div>
							</div>
						</td>
					</tr>

					<tr th:if="${citas.isEmpty()}">
						<td colspan="5" class="text-center text-white-50 py-4">
							No tienes citas reservadas todavía.
						</td>
					</tr>
				</tbody>

			</table>
		</div>

		<div class="mt-4">
			<a class="btn btn-secondary" th:href="@{/inicioUsuario}">
				<i class="bi bi-arrow-left"></i> Volver
			</a>
		</div>

	</main>

	<footer th:replace="~{fragments/pie :: pie}"></footer>

</body>

</html>
