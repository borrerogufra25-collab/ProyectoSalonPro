<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Nuevo Cliente</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/global.css}">
</head>

<body class="bg-dark text-white">

	<header th:replace="~{fragments/cabecera :: cabecera}"></header>

	<main class="container py-5">

		<div class="row justify-content-center">
			<div class="col-12 col-md-8 col-lg-6">

				<h2 class="text-warning mb-4 text-center fw-bold">
					Nuevo Cliente
				</h2>

				<form method="POST" th:object="${nuevoCliente}" th:action="@{/nuevoCliente/submit}"
					class="p-4 rounded shadow-lg bg-dark border border-warning">

					<input th:if="*{id != 0}" type="hidden" th:field="*{id}">

					<div class="mb-3">
						<label class="form-label text-warning fw-semibold">Nombre *</label>
						<input type="text" class="form-control bg-white text-dark border-warning" th:field="*{nombre}"
							required>
						<small class="opacity-75">Introduce el nombre completo</small>
					</div>

					<div class="mb-3">
						<label class="form-label text-warning fw-semibold">Email *</label>
						<input type="email" class="form-control bg-white text-dark border-warning" th:field="*{email}"
							required>
						<small class="opacity-75">Ejemplo: usuario@correo.com</small>
					</div>

					<div class="row">
						<div class="col-12 col-md-6 mb-3">
							<label class="form-label text-warning fw-semibold">Teléfono</label>
							<input type="text" class="form-control bg-white text-dark border-warning" pattern="^\d{9}$"
								th:field="*{telefono}">
							<small class="opacity-75">Debe tener 9 dígitos</small>
						</div>

						<div class="col-12 col-md-6 mb-3">
							<label class="form-label text-warning fw-semibold">Fecha de nacimiento</label>
							<input type="date" class="form-control bg-white text-dark border-warning"
								th:field="*{cumple}">
						</div>
					</div>

					<div class="mb-3">
						<label class="form-label text-warning fw-semibold">Contraseña *</label>
						<input type="password" class="form-control bg-white text-dark border-warning"
							th:field="*{contrasenia}" required>
					</div>

					<input type="hidden" th:field="*{role}">

					<div class="d-flex flex-column flex-sm-row justify-content-between mt-4 gap-3">
						<a th:href="@{/}" class="btn btn-outline-warning px-4">
							<i class="bi bi-arrow-left"></i> Volver
						</a>

						<button type="submit" class="btn btn-warning text-black fw-bold px-4">
							<i class="bi bi-check-circle"></i> Guardar
						</button>
					</div>

				</form>

			</div>
		</div>

	</main>

	<footer th:replace="~{fragments/pie :: pie}"></footer>

</body>

</html>
