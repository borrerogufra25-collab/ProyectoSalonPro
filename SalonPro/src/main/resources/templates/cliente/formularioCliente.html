<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Crear Cliente</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-dark text-white">

	<header th:replace="~{fragments/cabeceraAdmin :: cabeceraAdmin}"></header>

	<main class="container py-5">

		<h2 class="text-warning mb-4">
			Nuevo Cliente
		</h2>

		<!-- Falta th:action="addCliente" en el form (el método que mete el cliente en la db) -->
		<form method="POST" th:action="addCliente" th:object="${clienteForm}"
			class="bg-dark p-4 border border-warning rounded">

			<div class="mb-3">
				<label class="form-label text-warning fw-bold" for="nombre">Nombre</label>
				<input type="text" class="form-control border-warning" name="nombre" th:field="*{nombre}" required>
				<small>Introduce el nombre completo</small>
			</div>

			<div class="mb-3">
				<label class="form-label text-warning fw-bold" for="email">Email</label>
				<input type="email" class="form-control border-warning" name="email" th:field="*{email}">
				<small>Introduce un correo válido. Ej: ejemplo@correo.com</small>
			</div>

			<div class="mb-3">
				<label class="form-label text-warning fw-bold" for="telefono">Teléfono</label>
				<input type="text" class="form-control border-warning" pattern="^\d{9}$" name="telefono"
					th:field="*{telefono}">
				<small>Introduce un número de teléfono de 9 dígitos. Ej: 654987321</small>
			</div>

			<div class="mb-3">
				<label class="form-label text-warning fw-bold" for="fecha">Fecha de nacimiento</label>
				<input type="date" class="form-control border-warning" name="fecha" th:field="*{cumple}">
			</div>

			<!-- TODO: cambiar este enlace a la vista de cliente -->
			<div class="d-flex justify-content-between mt-4">
				<a href="#" class="btn btn-outline-warning">
					<i class="bi bi-arrow-left"></i> Volver
				</a>

				<button type="submit" value="submit" class="btn btn-warning text-black fw-bold">
					<i class="bi bi-check-circle"></i> Guardar
				</button>
			</div>

		</form>

	</main>

</body>

</html>
